name: Notify meta-labo

on:
  push:
    branches: [main]
    paths: [README.md]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch rebuild to meta-labo
        run: |
          curl -L -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.ORG_PAT }}" \
            https://api.github.com/repos/felleg-org/meta-labo/dispatches \
            -d '{"event_type":"rebuild"}'
